<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Overlapping Glass Panes -->
  <rect x="80" y="160" width="240" height="240" rx="48" fill="url(#grad1)" filter="url(#shadow)" />
  <rect x="192" y="112" width="240" height="240" rx="48" fill="url(#grad2)" style="mix-blend-mode: multiply;" filter="url(#shadow)" />
  
  <!-- "66" Text -->
  <text x="256" y="335" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="160" fill="#ffffff" text-anchor="middle" style="text-shadow: 0 4px 16px rgba(0,0,0,0.25); letter-spacing: -4px;">66</text>
</svg>
